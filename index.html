<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perpustakaan</title>
  <style>
    :root {
      --bg: linear-gradient(180deg, #f5efe4 0%, #efe4cf 100%);
      --paper: rgba(255, 252, 246, 0.92);
      --ink: #2d2418;
      --muted: #766854;
      --line: rgba(110, 86, 50, 0.15);
      --accent: #9c5f1a;
      --accent-soft: rgba(156, 95, 26, 0.1);
      --shadow: 0 24px 70px rgba(71, 49, 19, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--ink);
      padding: 24px;
    }

    .shell {
      width: min(920px, 100%);
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 36px 24px 24px;
      background:
        radial-gradient(circle at top right, rgba(156, 95, 26, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 248, 236, 0.8));
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 54px);
      line-height: 1;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 60ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .content {
      padding: 24px;
    }

    .search-box {
      position: sticky;
      top: 16px;
      z-index: 1;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: rgba(156, 95, 26, 0.45);
      box-shadow: 0 0 0 4px var(--accent-soft);
      transform: translateY(-1px);
    }

    .status {
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(156, 95, 26, 0.26);
      box-shadow: 0 12px 26px rgba(71, 49, 19, 0.08);
    }

    .title {
      font-weight: 700;
      font-size: 21px;
      margin-bottom: 6px;
    }

    .meta {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .empty {
      padding: 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px dashed var(--line);
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .hero,
      .content {
        padding: 20px;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Katalog Buku</p>
      <h1>Perpustakaan</h1>
      <p class="subtitle">
        Cari judul, penulis, genre, penerbit, atau tahun terbit dari katalog yang diambil langsung dari Google Sheets.
      </p>
    </section>

    <section class="content">
      <div class="search-box">
        <input type="text" id="search" placeholder="Cari buku, penulis, atau genre...">
      </div>

      <div id="status" class="status">Memuat data buku...</div>
      <div id="result" class="grid" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTa7m5F7T7Taf3U8Z_pCeI6taxnyNjg1SGzCaivczsyf7uCUEH56cdIkpQhxfbNfMp2yVwACxEZqM75/pub?output=csv";

    let dataBuku = [];

    const searchInput = document.getElementById("search");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    fetch(`${url}&cache=${Date.now()}`)
      .then((res) => {
        if (!res.ok) {
          throw new Error(`Gagal mengambil data spreadsheet. Status: ${res.status}`);
        }
        return res.text();
      })
      .then((text) => {
        const rows = parseCSV(text).slice(1).filter((row) => row.some(Boolean));
        if (rows.length === 0) {
          throw new Error("Spreadsheet berhasil dibuka, tetapi tidak ada baris buku yang terbaca.");
        }
        dataBuku = rows.map((cols) => ({
          judul: (cols[0] || "").trim(),
          penulis: (cols[1] || "").trim(),
          genre: (cols[2] || "").trim(),
          penerbit: (cols[3] || "").trim(),
          tahun: (cols[4] || "").trim()
        }));
        tampilkan(dataBuku);
      })
      .catch((error) => {
        console.error(error);
        statusEl.textContent = "Data tidak bisa dimuat saat ini.";
        resultEl.innerHTML = `
          <div class="empty">
            Coba buka ulang halaman. Jika tetap gagal, cek apakah Google Sheets sudah dipublikasikan ke web dan koneksi ke docs.google.com tidak diblokir.
          </div>
        `;
      });

    searchInput.addEventListener("input", function () {
      const keyword = this.value.trim().toLowerCase();

      const hasil = dataBuku.filter((buku) =>
        Object.values(buku).some((val) =>
          val && val.toLowerCase().includes(keyword)
        )
      );

      tampilkan(hasil, keyword);
    });

    function tampilkan(data, keyword = "") {
      resultEl.innerHTML = "";

      if (data.length === 0) {
        statusEl.textContent = keyword
          ? `Tidak ada hasil untuk "${keyword}".`
          : "Belum ada data buku.";
        resultEl.innerHTML = '<div class="empty">Tidak ditemukan.</div>';
        return;
      }

      statusEl.textContent = `${data.length} buku ditemukan.`;

      data.forEach((buku) => {
        resultEl.innerHTML += `
          <article class="card">
            <div class="title">${escapeHTML(buku.judul)}</div>
            <div class="meta">${escapeHTML(buku.penulis)} • ${escapeHTML(buku.genre)}</div>
            <div class="meta">${escapeHTML(buku.penerbit)} • ${escapeHTML(buku.tahun)}</div>
          </article>
        `;
      });
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") {
            i += 1;
          }
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
          continue;
        }

        value += char;
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function escapeHTML(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
