<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shira Media Library</title>
  <style>
    :root {
      --bg: #f7ead7;
      --wood: #8c5a2e;
      --wood-dark: #51331e;
      --wood-soft: #c4935e;
      --cream: #fff9ef;
      --peach: #f7cdbb;
      --mint: #d8ead8;
      --sage: #799878;
      --sky: #d7e5ef;
      --ink: #2b2118;
      --muted: #766958;
      --line: rgba(91, 60, 32, 0.18);
      --shadow: 0 18px 48px rgba(73, 48, 23, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(90deg, rgba(140, 90, 46, 0.08) 0 1px, transparent 1px 80px),
        linear-gradient(180deg, #fff6e8 0%, var(--bg) 48%, #ecd7bc 100%);
      color: var(--ink);
      padding: 22px;
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
      overflow: hidden;
      background: rgba(255, 249, 239, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 34px 26px 24px;
      color: #fffaf1;
      background:
        linear-gradient(135deg, rgba(81, 51, 30, 0.94), rgba(140, 90, 46, 0.9)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 16px, transparent 16px 42px);
      border-bottom: 5px solid var(--wood-soft);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--peach);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 66ch;
      margin: 14px 0 0;
      color: #f7e7d2;
      font-size: 16px;
      line-height: 1.6;
    }

    .content {
      padding: 22px;
    }

    .panel {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #fffdf7, #fff4e5);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffef9;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: rgba(140, 90, 46, 0.58);
      box-shadow: 0 0 0 4px rgba(247, 205, 187, 0.52);
    }

    .hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--mint);
      color: #405e3f;
      font-size: 13px;
    }

    .tag:nth-child(2) {
      background: var(--sky);
      color: #425b68;
    }

    .tag:nth-child(3) {
      background: #f9ded2;
      color: #744633;
    }

    .status {
      min-height: 22px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 15px;
      background: rgba(255, 253, 247, 0.95);
      border: 1px solid var(--line);
      border-left: 6px solid var(--wood-soft);
      border-radius: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: rgba(140, 90, 46, 0.32);
      box-shadow: 0 12px 24px rgba(73, 48, 23, 0.09);
    }

    .title {
      margin: 0 0 6px;
      color: var(--wood-dark);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .year {
      min-width: 58px;
      padding: 7px 9px;
      border-radius: 8px;
      background: var(--sky);
      color: #3f5a66;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    .empty {
      padding: 22px;
      border: 1px dashed rgba(91, 60, 32, 0.28);
      border-radius: 8px;
      background: #fff8ed;
      color: var(--muted);
      text-align: center;
    }

    .pager {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .pager.is-visible {
      display: flex;
    }

    .pager-info {
      color: var(--muted);
      font-size: 14px;
    }

    .pager-actions {
      display: flex;
      gap: 8px;
    }

    button {
      min-width: 42px;
      min-height: 40px;
      padding: 9px 13px;
      border: 1px solid rgba(81, 51, 30, 0.2);
      border-radius: 8px;
      background: var(--wood);
      color: #fffaf1;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      transition: background 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--wood-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    @media (max-width: 680px) {
      body {
        padding: 12px;
      }

      .hero,
      .content {
        padding: 18px;
      }

      .search-row,
      .card {
        grid-template-columns: 1fr;
      }

      .year {
        width: fit-content;
      }

      .pager {
        align-items: stretch;
        flex-direction: column;
      }

      .pager-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Koleksi Buku</p>
      <h1>Shira Media Library</h1>
      <p class="subtitle">
        Cari koleksi buku Shira Media Library dari judul, penulis, dan genre buku.
      </p>
    </section>

    <section class="content">
      <div class="panel">
        <div class="search-row">
          <label>
            Kata pencarian
            <input type="text" id="search" placeholder="Cari minimal 3 huruf...">
          </label>
          <label>
            Filter
            <select id="filter">
              <option value="all">Semua data</option>
              <option value="judul">Judul</option>
              <option value="penulis">Penulis</option>
              <option value="genre">Genre</option>
              <option value="penerbit">Penerbit</option>
              <option value="bahasa">Bahasa</option>
            </select>
          </label>
        </div>
        <div class="hint-row" aria-hidden="true">
          <span class="tag">Masukan Minimal 3 huruf</span>
          <span class="tag">Shira Media</span>
          <span class="tag">Buku adalah Sayap Sang Waktu</span>
        </div>
      </div>

      <p id="status" class="status">Ketik minimal 3 huruf untuk mencari buku.</p>
      <div id="result" class="grid" aria-live="polite"></div>

      <nav id="pager" class="pager" aria-label="Navigasi hasil">
        <span id="pageInfo" class="pager-info"></span>
        <div class="pager-actions">
          <button type="button" id="prevPage" aria-label="Halaman sebelumnya">&lt;</button>
          <button type="button" id="nextPage" aria-label="Halaman berikutnya">&gt;</button>
        </div>
      </nav>
    </section>
  </main>

  <script>
    const PAGE_SIZE = 7;

    const searchInput = document.getElementById("search");
    const filterSelect = document.getElementById("filter");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");
    const pagerEl = document.getElementById("pager");
    const pageInfoEl = document.getElementById("pageInfo");
    const prevPageBtn = document.getElementById("prevPage");
    const nextPageBtn = document.getElementById("nextPage");

    let searchTimer;
    let searchController;
    let hasilBuku = [];
    let keywordAktif = "";
    let halamanAktif = 1;
    let hasilTerbatas = false;

    searchInput.addEventListener("input", jadwalkanPencarian);
    filterSelect.addEventListener("change", jadwalkanPencarian);
    prevPageBtn.addEventListener("click", () => pindahHalaman(halamanAktif - 1));
    nextPageBtn.addEventListener("click", () => pindahHalaman(halamanAktif + 1));

    function jadwalkanPencarian() {
      const keyword = searchInput.value.trim();
      clearTimeout(searchTimer);

      if (keyword.length < 3) {
        hasilBuku = [];
        halamanAktif = 1;
        resultEl.innerHTML = "";
        pagerEl.classList.remove("is-visible");
        statusEl.textContent = "Ketik minimal 3 huruf untuk mencari buku.";
        return;
      }

      searchTimer = setTimeout(() => {
        cariBuku(keyword);
      }, 250);
    }

    async function cariBuku(keyword) {
      if (searchController) {
        searchController.abort();
      }

      searchController = new AbortController();
      keywordAktif = keyword;
      halamanAktif = 1;
      statusEl.textContent = "Mencari buku...";

      try {
        const params = new URLSearchParams({
          q: keyword,
          filter: filterSelect.value
        });
        const response = await fetch(`/api/search?${params.toString()}`, {
          signal: searchController.signal
        });
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.error || "Pencarian gagal.");
        }

        hasilBuku = payload.data || [];
        hasilTerbatas = Boolean(payload.limited);
        tampilkanHalaman();
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }

        console.error(error);
        hasilBuku = [];
        pagerEl.classList.remove("is-visible");
        statusEl.textContent = "Pencarian tidak bisa dilakukan saat ini.";
        resultEl.innerHTML = '<div class="empty">Coba lagi beberapa saat lagi.</div>';
      }
    }

    function pindahHalaman(halaman) {
      const totalHalaman = Math.ceil(hasilBuku.length / PAGE_SIZE);
      halamanAktif = Math.min(Math.max(halaman, 1), totalHalaman);
      tampilkanHalaman();
    }

    function tampilkanHalaman() {
      resultEl.innerHTML = "";

      if (hasilBuku.length === 0) {
        statusEl.textContent = `Tidak ada hasil untuk "${keywordAktif}".`;
        resultEl.innerHTML = '<div class="empty">Tidak ditemukan.</div>';
        pagerEl.classList.remove("is-visible");
        return;
      }

      const totalHalaman = Math.ceil(hasilBuku.length / PAGE_SIZE);
      const awal = (halamanAktif - 1) * PAGE_SIZE;
      const dataHalaman = hasilBuku.slice(awal, awal + PAGE_SIZE);
      const akhir = awal + dataHalaman.length;

      statusEl.textContent = hasilTerbatas
        ? `${hasilBuku.length} hasil teratas untuk "${keywordAktif}".`
        : `${hasilBuku.length} buku ditemukan untuk "${keywordAktif}".`;

      dataHalaman.forEach((buku) => {
        resultEl.innerHTML += `
          <article class="card">
            <div>
              <h2 class="title">${escapeHTML(buku.judul || "Tanpa judul")}</h2>
              <div class="meta">${escapeHTML(buku.penulis || "Penulis belum tercatat")}</div>
              <div class="meta">${escapeHTML(buku.genre || "Genre belum tercatat")} - ${escapeHTML(buku.penerbit || "Penerbit belum tercatat")}</div>
            </div>
            <div class="year">${escapeHTML(buku.bahasa || "-")}</div>
          </article>
        `;
      });

      pageInfoEl.textContent = `Menampilkan Halaman ${halamanAktif}/${totalHalaman}.`;
      prevPageBtn.disabled = halamanAktif === 1;
      nextPageBtn.disabled = halamanAktif === totalHalaman;
      pagerEl.classList.toggle("is-visible", totalHalaman > 1);
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
